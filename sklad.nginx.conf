# /etc/nginx/sites-available/sklad
# Этот файл — ОТДЕЛЬНЫЙ server-блок для SKLAD.
# Он не затрагивает твой существующий сайт-заглушку.
# Замени YOUR_DOMAIN на реальный домен (например: sklad.example.com)

server {
    listen 80;
    server_name YOUR_DOMAIN;

    # Редирект на HTTPS (раскомментировать после получения SSL)
    # return 301 https://$host$request_uri;

    location / {
        proxy_pass http://127.0.0.1:5000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Статика Flask — отдаём напрямую через nginx (быстрее)
    location /static/ {
        alias /var/www/sklad/static/;
        expires 7d;
        add_header Cache-Control "public";
    }

    # Загруженные файлы (логотип и т.д.)
    location /static/uploads/ {
        alias /var/www/sklad/static/uploads/;
        expires 30d;
    }

    client_max_body_size 10M;
    access_log /var/log/nginx/sklad_access.log;
    error_log  /var/log/nginx/sklad_error.log;
}

